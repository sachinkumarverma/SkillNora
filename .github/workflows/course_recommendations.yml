name: Daily Course Recommendations

on:
  schedule:
    # Runs at 11:00 AM IST (05:30 UTC) every day
    - cron: '30 5 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  send-recommendations:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Recommendation API
        run: |
          curl -X POST https://skillnora.onrender.com/api/cron/recommendations \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail
